<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>NewsRadarJP TikTok Auth</title></head>
<body>
<h1>TikTok Authorization</h1>
<p id="msg">Processing...</p>
<pre id="code" style="font-size:18px;background:#eee;padding:10px;"></pre>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
if (error) {
  document.getElementById('msg').textContent = 'Error: ' + (params.get('error_description') || error);
} else if (code) {
  document.getElementById('msg').textContent = 'Authorization code (copy this and paste into terminal):';
  document.getElementById('code').textContent = code;
} else {
  document.getElementById('msg').textContent = 'No authorization code found.';
}
</script>
</body></html>
